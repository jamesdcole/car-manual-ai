<!DOCTYPE html>
<html>
<head>
  <title>Garage Mechanic AI</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
    select, input, button { padding: 10px; margin: 10px 0; font-size: 16px; }
    #answer { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; }
    h1 { color: #2c5530; }
    .input-group { margin: 15px 0; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    input:focus { outline: 2px solid #2c5530; }
  </style>
</head>
<body>
  <h1>🔧 Garage Mechanic AI</h1>
  
  <div class="input-group">
    <label>Manual Filename:</label>
    <input type="text" id="manualName" placeholder="Dodge_Ram_1500v1.pdf" style="width: 50%;">
  </div>

  <div class="input-group">
    <label>Question:</label>
    <input type="text" id="question" placeholder="oil drain plug torque?" style="width: 70%;">
    <button onclick="askMechanic()">Ask Mechanic</button>
  </div>

  <div id="answer">Ask about torque specs, procedures, diagrams...</div>

  <script>
    async function askMechanic() {
      const manualName = document.getElementById('manualName').value.trim();
      const question = document.getElementById('question').value.trim();
      const answerDiv = document.getElementById('answer');
      
      // 🔥 VALIDATION
      if (!manualName) {
        answerDiv.textContent = '❌ Enter manual filename (e.g., Dodge_Ram_1500v1.pdf)';
        return;
      }
      if (!manualName.endsWith('.pdf')) {
        answerDiv.textContent = '❌ Filename must end with .pdf';
        return;
      }
      if (!question) {
        answerDiv.textContent = '❌ Enter your question';
        return;
      }
      
      answerDiv.textContent = '🔄 Mechanic is checking the manual...';
      
      try {
        console.log('Sending:', { manualId: manualName, question }); // Debug
        
        const response = await fetch('https://us-central1-car-manual-ai-5c053.cloudfunctions.net/ask', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ manualId: manualName, question })
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        
        if (!data.answer) {
          throw new Error('No answer from mechanic');
        }
        
        answerDiv.innerHTML = data.answer;
        
        // 🔥 DIAGRAM BUTTON MAGIC
        if (data.answer.includes('Page') && 
            (data.answer.includes('Fig') || data.answer.includes('Figure') || data.answer.includes('DIAGRAM'))) {
          const pageMatch = data.answer.match(/Page (\d+)/i);
          if (pageMatch) {
            const pageNum = pageMatch[1];
            const currentManualName = document.getElementById('manualName').value.trim();
            answerDiv.innerHTML += `
              <br><br>
              <button onclick="viewPage('${currentManualName}', ${pageNum})" 
                      style="background:#2c5530;color:white;padding:12px;border:none;border-radius:5px;font-size:16px;cursor:pointer;">
                📖 View Diagram - Page ${pageNum}
              </button>
            `;
          }
        }
      } catch (error) {
        console.error('Error:', error);
        answerDiv.textContent = `❌ Error: ${error.message}\n\n💡 Tip: Make sure "${manualName}" exists in Firebase Storage/manuals/`;
      }
    }

    // Enter key support
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        const questionInput = document.getElementById('question');
        if (document.activeElement === questionInput) {
          askMechanic();
        }
      }
    });

    // 🔥 VIEW PAGE FUNCTION
    function viewPage(filename, page) {
      const url = `https://firebasestorage.googleapis.com/v0/b/car-manual-ai-5c053.appspot/o/manuals%2F${filename}?alt=media#page=${page}`;
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
